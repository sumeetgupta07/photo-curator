# Photo Curator v3.0.0 — docker-compose.yml
# Purpose: Docker Compose for v3 backend.
#          Frontend (PWA) to be added in Phase 3.
#          No OAuth. No upload pipeline. Clean slate.
#
# Changelog:
#   v3.0.0 — Initial v3 compose. Backend only for Phase 1.

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: photo-curator-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - curator_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/photo-curator.db
      - THUMBS_DIR=/app/data/thumbs
      # Set these in a .env file — do NOT commit real values
      - EXT_SECRET=${EXT_SECRET}
      - CURATOR_PASSWORD=${CURATOR_PASSWORD}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://photo.sumeetg.duckdns.org}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  curator_data:
    name: photo_curator_v3_data
