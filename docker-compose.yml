# docker-compose.yml — v2.1
services:
  photo-curator:
    build: .
    ports:
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.js:/app/vite.config.js
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - media_network

  backend:
    build: ./server
    ports:
      - "3001:3001"
    volumes:
      - ./server/src:/app/src
      - backend-data:/app/data
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      - media_network

volumes:
  backend-data:

networks:
  media_network:
    external: true
